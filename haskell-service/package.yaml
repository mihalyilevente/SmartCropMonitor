name:                haskell-service
version:             0.1.11.0

dependencies:
  - base >= 4.7 && < 5
  - scotty
  - aeson
  - text
  - http-types
  - wai-extra
  - time

library:
  source-dirs: src
  exposed-modules:
    - Biomass
    - Stats
    - SprayingWindow
    - Validation
    - WeatherMetrics
    - SatelliteAnomaly
    - DiseaseModels
    - DiseaseTypes

executables:
  haskell-service-exe:
    main:                Main.hs
    source-dirs:         src
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - haskell-service

tests:
  haskell-service-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - haskell-service
      - hspec >= 2.11
      - time