name: Pre-merge tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pre-merge-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall app

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  haskell:
    name: Haskell tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: haskell-service
    steps:
      - uses: actions/checkout@v4

      - name: Cache Stack
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            haskell-service/.stack-work
          key: stack-${{ runner.os }}-${{ hashFiles('haskell-service/stack.yaml.lock') }}
          restore-keys: stack-${{ runner.os }}-

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-no-global: true

      - name: Build dependencies
        run: stack build --only-dependencies --test

      - name: Run tests
        run: stack test --test-arguments "--format=progress"